# Install once per clone: uv run pre-commit install
# Hooks run on staged files before `git commit`.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff-format
        files: ^(src/|tests/)
      - id: ruff-check
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(src/|tests/)
